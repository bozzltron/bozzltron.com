# Appearance (paired with layouts from Ghost Attila 3.9.x; see README.md)
# Upstream Ghost theme: https://github.com/zutrinken/attila — still maintained as of sync.
accent_color: '#15171A'
darkmode_accent_color: '#ff6633'
# system | light | dark — persists via localStorage in head (there is no footer theme toggle UI)
color_scheme: system

# Post header avatar (same-site asset path preferred; omit to use bundled default)
avatar: '/images/app_icons/ios/512.png'

# Listing header (.blog-header on index/archives; falls back to site title / description when unset)
blog_name: '@bozzltron'
blog_tagline: 'A Message In A Bottle'

# Header
menu:
  Home: /
  Archives: /archives
rss: /atom.xml

# Content
excerpt_link: Read More

# Miscellaneous (empty = disabled — keys kept for Ghost Attila-compatible partials if re-enabled later)
google_analytics:
gauges_analytics:
favicon: /favicon.png
twitter:
google_plus:
fb_admins: